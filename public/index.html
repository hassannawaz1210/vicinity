<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#02070a" />
<title>Vicinity — talk to whoever's nearby</title>
<style>
  :root {
    --bg: #02070a;
    --panel: rgba(0, 30, 20, 0.35);
    --stroke: rgba(80, 255, 170, 0.25);
    --text: #c8ffe6;
    --muted: #6fae93;
    --green: #44ff99;
    --amber: #ffc457;
    --danger: #ff6b7a;
    --mono: ui-monospace, "SF Mono", "Cascadia Mono", Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; margin: 0; }
  body {
    font-family: var(--mono);
    color: var(--text);
    background: var(--bg);
    display: flex; flex-direction: column; align-items: center;
    min-height: 100%;
    padding: env(safe-area-inset-top) 16px calc(env(safe-area-inset-bottom) + 16px);
    overflow: hidden;
  }
  .wrap { width: 100%; max-width: 640px; margin: auto; display: flex; flex-direction: column; flex: 1; min-height: 0; }

  header { text-align: center; margin: 18px 0 14px; }
  .logo {
    font-size: 2rem; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--green); text-shadow: 0 0 12px rgba(68,255,153,0.6);
  }
  .tagline { color: var(--muted); margin-top: 6px; font-size: 0.82rem; letter-spacing: 0.05em; }

  .card {
    background: var(--panel); border: 1px solid var(--stroke);
    border-radius: 14px; padding: 22px;
  }

  /* landing */
  .setup { display: flex; flex-direction: column; gap: 16px; }
  .label { color: var(--muted); font-size: 0.78rem; letter-spacing: 0.1em; text-transform: uppercase; }
  .namerow { display: flex; gap: 10px; }
  input#name {
    flex: 1; min-width: 0; background: rgba(0,0,0,0.4); border: 1px solid var(--stroke);
    color: var(--green); border-radius: 10px; padding: 13px 14px; font: inherit; font-size: 1.05rem; outline: none;
  }
  input#name:focus { border-color: var(--green); box-shadow: 0 0 0 2px rgba(68,255,153,0.15); }
  .icon-btn {
    flex: none; border-radius: 10px; border: 1px solid var(--stroke);
    background: rgba(0,0,0,0.4); color: var(--muted); font: inherit; cursor: pointer;
    padding: 0 16px; letter-spacing: 0.08em; text-transform: uppercase; font-size: 0.78rem;
  }
  .icon-btn:active { transform: scale(0.94); }

  .btn {
    border: none; cursor: pointer; border-radius: 12px; padding: 15px; font: inherit;
    font-size: 1rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
    color: #02110a; background: var(--green); box-shadow: 0 0 24px rgba(68,255,153,0.3);
  }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; box-shadow: none; }
  .btn:not(:disabled):active { transform: translateY(1px); }

  /* room */
  #room { flex: 1; min-height: 0; display: flex; flex-direction: column; gap: 12px; }
  .stage {
    flex: 1; min-height: 0; position: relative;
    border: 1px solid var(--stroke); border-radius: 14px; overflow: hidden; background: #01040a;
  }
  #scene { display: block; width: 100%; height: 100%; }
  /* mute lives in the scope's corner so it costs no layout space */
  #muteBtn {
    position: absolute; top: 12px; right: 12px; z-index: 2;
    border: 1px solid var(--stroke); background: rgba(0,0,0,0.5); color: var(--muted);
    border-radius: 8px; padding: 7px 12px; font: inherit; cursor: pointer;
    letter-spacing: 0.12em; text-transform: uppercase; font-size: 0.7rem;
  }
  #muteBtn.muted { background: var(--danger); color: #2a0f14; border-color: transparent; }

  /* range +/- cluster, bottom-right corner of the scope */
  .rangectl {
    position: absolute; right: 12px; bottom: 12px; z-index: 2;
    display: flex; align-items: center; gap: 8px;
  }
  .rangectl .rv {
    min-width: 64px; text-align: center; font-size: 0.7rem; letter-spacing: 0.1em;
    color: var(--green); text-shadow: 0 0 8px rgba(68,255,153,0.7);
  }
  .rbtn {
    width: 30px; height: 30px; line-height: 1; font-size: 1.2rem;
    border: 1px solid var(--stroke); background: rgba(0,0,0,0.5); color: var(--green);
    border-radius: 8px; cursor: pointer; display: grid; place-items: center;
  }
  .rbtn:active { transform: scale(0.92); }
  .rbtn:disabled { opacity: 0.3; cursor: not-allowed; }

  .status { text-align: center; color: var(--muted); margin: 10px 0 0; font-size: 0.82rem; letter-spacing: 0.04em; }
  .status.error { color: var(--danger); }

  .hidden { display: none !important; }
  audio { display: none; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">Vicinity</div>
    <div class="tagline">talk to whoever's nearby · no names, no trace</div>
  </header>

  <!-- landing -->
  <section id="setup" class="card setup">
    <div>
      <div class="label">callsign</div>
      <div class="namerow" style="margin-top:8px">
        <input id="name" type="text" maxlength="24" placeholder="pick a name" autocomplete="off" spellcheck="false" />
        <button id="shuffle" class="icon-btn" title="random name">rnd</button>
      </div>
    </div>
    <button id="joinBtn" class="btn">Join the room</button>
  </section>

  <!-- in-room -->
  <section id="room" class="hidden">
    <div class="stage">
      <canvas id="scene"></canvas>
      <button id="muteBtn">Mute</button>
      <div class="rangectl">
        <button id="rangeDown" class="rbtn" title="shrink range">-</button>
        <span id="rangeVal" class="rv">150 M</span>
        <button id="rangeUp" class="rbtn" title="grow range">+</button>
      </div>
    </div>
  </section>

  <p id="status" class="status hidden"></p>
  <div id="audioContainer"></div>
</div>
<script type="module" src="client.js"></script>
</body>
</html>
